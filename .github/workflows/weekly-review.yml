name: Weekly Review (Monday Morning)

# 目的: 毎週月曜朝に「先週のシグナル全件 × 結果 × 学び」を集計し、
#       guide-weekly-review-YYYY-MM-DD.html として配置する。
#
# auto_weekly_review.py は曜日チェック（月曜のみ）を内蔵しているので、
# 念のため毎日走らせても害はないが、コスト節約のため月曜朝のみ schedule。

on:
  schedule:
    # 22:13 UTC 日曜 = 07:13 JST 月曜（:00 を避けて遅延混雑回避）
    - cron: '13 22 * * 0'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
      GITHUB_ACTIONS_RUN:   "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Generate weekly review article
        run: python auto_weekly_review.py

      - name: Commit & push if new article generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide-weekly-review-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new weekly review article to commit (likely already exists)."
          else
            git commit -m "auto: weekly review $(TZ=Asia/Tokyo date +'%Y-%m-%d JST')"
            git pull --rebase origin main || true
            git push
          fi
