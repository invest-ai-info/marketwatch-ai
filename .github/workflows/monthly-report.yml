name: Monthly Report (Month-Start)

# 目的: 毎月 1 日朝に「先月の AI トレード成績書」を集計し、
#       guide-monthly-report-YYYY-MM.html として配置する。
#
# generate_monthly_report.py は日付チェック（月初 1〜3 日のみ）を内蔵しているので、
# cron 遅延で 1 日に間に合わなくても 2-3 日のうちに走れば OK。

on:
  schedule:
    # 00:23 UTC 毎月 1 日 = 09:23 JST 1 日（monthly-backup.yml の 09:10 と競合回避）
    - cron: '23 0 1 * *'
  workflow_dispatch:

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
      GITHUB_ACTIONS_RUN:   "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Generate monthly report article
        run: python generate_monthly_report.py

      - name: Commit & push if new article generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide-monthly-report-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new monthly report article to commit (likely already exists)."
          else
            git commit -m "auto: monthly report $(TZ=Asia/Tokyo date +'%Y-%m JST')"
            git pull --rebase origin main || true
            git push
          fi
