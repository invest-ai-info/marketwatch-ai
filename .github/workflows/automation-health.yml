name: Automation Health Watch

# 目的: 裏方の自動化（cron ワークフロー / 予約エージェント routine）が
#       ちゃんと走っているかを点検する番人。沈黙の失敗（例: panic-scan が5日間停止）を検知する。
#       health-check.yml が公開6ページの死活を見るのに対し、こちらはその死角＝裏方ジョブを見る。
#       読み取り専用（HTML やデータを書き換えない）。異常時は Issue を自動で立てて通知する。

on:
  schedule:
    - cron: '30 0 * * *'   # 09:30 JST（朝の自動化が出揃った後）
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run automation health check
        id: check
        env:
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_automation_health.py

      - name: Open or update issue on failure
        if: failure() && hashFiles('automation_health_report.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('automation_health_report.md', 'utf8');
            const today = new Date().toLocaleDateString('ja-JP', {
              timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
            }).replace(/\//g, '-');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation-health',
              per_page: 1
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 裏方の自動化に異常: ${today}`,
                body: body,
                labels: ['bug', 'automation-health']
              });
              core.info('新規 issue を作成しました');
            } else {
              const issueNumber = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `## 🔁 ${today} 再検知\n\n${body}`
              });
              core.info(`既存 issue #${issueNumber} にコメント追加しました`);
            }
