name: Health Check Market News

# 目的: marketwatch-jp.com が正常に更新されているかを定期チェックする。
#       異常を検知したら GitHub Issue を自動で立てて通知する。
#       Update Market News ワークフローとは独立した「読み取り専用」の監視。
#       書き込み（HTML 上書き）は一切しないので「自動更新の二重化」にはならない。

on:
  schedule:
    # 朝の更新（最終フォールバック 8:57 JST）+ 90 分のバッファ
    - cron: '0 3 * * *'    # 12:00 JST
    # 夕方の更新（最終フォールバック 17:43 JST）+ 約 2.5 時間のバッファ
    - cron: '0 11 * * *'   # 20:00 JST
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run health check
        id: check
        run: python check_site_health.py

      - name: Open or update issue on failure
        if: failure() && hashFiles('health_report.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('health_report.md', 'utf8');
            const today = new Date().toLocaleDateString('ja-JP', {
              timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
            }).replace(/\//g, '-');

            // 既存の open issue があるか確認（重複防止）
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check',
              per_page: 1
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 サイト異常検知: ${today}`,
                body: body,
                labels: ['bug', 'health-check']
              });
              core.info('新規 issue を作成しました');
            } else {
              const issueNumber = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `## 🔁 ${today} 再検知\n\n${body}`
              });
              core.info(`既存 issue #${issueNumber} にコメント追加しました`);
            }
