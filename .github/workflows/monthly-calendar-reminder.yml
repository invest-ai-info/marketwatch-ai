name: Monthly Calendar Reminder

# 目的:
# - 毎月 25 日朝に「来月の主要経済指標」を Gemini で取得 → メール送信
# - 同時に generate_market_holidays.py で 2026-2027 年の市場休場日を自動補充
# - economic-events.json に追加された休場日は git push

on:
  schedule:
    # 25 日 00:13 UTC = 25 日 09:13 JST (cron 混雑回避のため :00 を避ける)
    - cron: '13 0 25 * *'
  workflow_dispatch:

jobs:
  calendar-reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
      GMAIL_USER:           ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_RECIPIENT:      ${{ secrets.ALERT_RECIPIENT }}
      GITHUB_ACTIONS_RUN:   "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Auto-add market holidays (2026-2027)
        run: python generate_market_holidays.py

      - name: Send monthly calendar reminder email
        run: python monthly_calendar_reminder.py

      - name: Commit & push if economic-events.json updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add economic-events.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: market holidays auto-fill $(TZ=Asia/Tokyo date +'%Y-%m-%d JST')"
            git pull --rebase origin main || true
            git push
          fi
