name: Technical Alerts (4H)

# 目的: 5 銘柄の 4H 足チャートをテクニカル分析し、シグナル発火時にメール送信。
#       連投防止のため同じシグナルは 12 時間クールダウン。

on:
  schedule:
    # 4 時間ごと（UTC）。4H 足の確定タイミング 30 分後を目安に
    - cron: '30 0,4,8,12,16,20 * * *'   # 09:30/13:30/17:30/21:30/01:30/05:30 JST
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GMAIL_USER:         ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_RECIPIENT:    ${{ secrets.ALERT_RECIPIENT }}
      GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy google-generativeai

      - name: Run technical analysis & alerts
        run: python generate_technical_alerts.py

      - name: Commit history if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add technical-alerts-history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: technical alerts history $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
            git pull --rebase origin main || true
            git push
          fi
