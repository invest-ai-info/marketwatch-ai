name: Technical Alerts (4H)

# 目的: 5 銘柄の 4H 足チャートをテクニカル分析し、シグナル発火時にメール送信。
#       連投防止のため同じシグナルは 12 時間クールダウン。
#       発火したシグナルは signals-log.json に蓄積し、後続ステップで結果判定 + track-record.html を生成。

on:
  schedule:
    # 4 時間ごと（UTC）。4H 足の確定タイミング 30 分後を目安に。
    # GitHub Actions の cron は混雑時にスキップされるため、各時刻を +30 分/+1 時間で冗長化（3 重）
    # スクリプト側のクールダウン（4-24h）で重複メール送信は自動防止される
    - cron: '30 0,4,8,12,16,20 * * *'   # 本命: 09:30/13:30/17:30/21:30/01:30/05:30 JST
    - cron: '0  1,5,9,13,17,21 * * *'   # +30分: 10:00/14:00/18:00/22:00/02:00/06:00 JST
    - cron: '30 1,5,9,13,17,21 * * *'   # +1時間: 10:30/14:30/18:30/22:30/02:30/06:30 JST
  workflow_dispatch:

# 🆕 signal 系 workflow 同時実行禁止（git 競合回避）
# technical-alerts.yml と technical-alerts-1h.yml が同じファイル
# (signals-log.json / track-record.html) を編集するため、順番待ち実行
concurrency:
  group: signal-workflows
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GMAIL_USER:         ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_RECIPIENT:    ${{ secrets.ALERT_RECIPIENT }}
      GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
      MY_TRADES_CSV_URL:  ${{ secrets.MY_TRADES_CSV_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy google-generativeai

      - name: Run technical analysis & alerts
        run: python generate_technical_alerts.py

      - name: Evaluate signal outcomes
        run: python evaluate_signal_outcomes.py

      - name: Import my real trades (Google Form → CSV)
        run: python import_my_trades.py

      - name: Generate track-record.html
        run: python generate_track_record_page.py

      - name: Export to CSV (signals-log.csv / my-trades.csv)
        run: python export_to_csv.py

      - name: Commit history & track-record if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add technical-alerts-history.json signals-log.json signals-log.csv my-trades.json my-trades.csv track-record.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: technical alerts + track-record $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
            # 🆕 push リトライ（最大 3 回）+ コンフリクト時はリモート優先 (-X theirs)
            for i in 1 2 3; do
              if git pull --rebase -X theirs origin main && git push; then
                echo "✅ Push success on attempt $i"
                break
              fi
              echo "⚠️ Push failed (attempt $i), retrying..."
              git rebase --abort 2>/dev/null || true
              sleep 10
            done
          fi
