name: Update Market News

on:
  # 記事公開で generate_market_news.py が更新されたら即 index 再生成（更新履歴の即反映・遅延ゼロ）。
  # ※このワークフローは generate_market_news.py を commit しないので自己再起動ループは起きない。
  push:
    paths:
      - 'generate_market_news.py'
      - 'jp-rankings.json'        # 日本株ランキング更新時に hot-assets を即再描画（夕方更新を遅延ゼロで反映）
  schedule:
    # ─── 朝の更新（米国市場クローズ後）─── 4回試行でスキップ対策
    - cron: '27 22 * * *'   # 7:27 JST 本命
    - cron: '57 22 * * *'   # 7:57 JST バックアップ1（30分後）
    - cron: '27 23 * * *'   # 8:27 JST バックアップ2（1時間後）
    - cron: '57 23 * * *'   # 8:57 JST バックアップ3（1.5時間後）
    # ─── 夕方の更新（東京市場クローズ後）─── 4回試行でスキップ対策
    - cron: '13 7 * * *'    # 16:13 JST 本命
    - cron: '43 7 * * *'    # 16:43 JST バックアップ1（30分後）
    - cron: '13 8 * * *'    # 17:13 JST バックアップ2（1時間後）
    - cron: '43 8 * * *'    # 17:43 JST バックアップ3（1.5時間後）
    # ─── 夜の更新（米経済指標 発表後の「結果速報」バナーを同夜に反映）───
    #     indicator-result routine（23:13 JST）が indicator-result.json を書いた直後に index を再生成し、
    #     トップの注目指標バナーを「プレビュー→結果速報」へ同夜で刷り替える。発表が無い夜は「変更なし」でほぼ無害。
    - cron: '43 14 * * *'   # 23:43 JST 本命（結果routineの約30分後）
    - cron: '13 15 * * *'   # 翌0:13 JST バックアップ（cronスキップ対策）
    # ※スクリプト側で「変更なし」判定すれば2回目以降のpushは自動でスキップされる
    # ※GitHub無料プランは混雑時にcronスキップされるため複数時刻で冗長化
  workflow_dispatch:  # 手動実行も可能
    inputs:
      force_weekly:
        description: '週次戦略記事を強制再生成（既存上書き）'
        required: false
        default: 'false'

concurrency:
  group: update-market-news-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # GitHub Actions 実行中であることをスクリプトに伝える（API経由のアップロードをスキップさせる）
      GITHUB_ACTIONS_RUN: "true"
      # NewsAPI キーは GitHub Secrets から取得（要: リポジトリ設定 > Secrets > NEWSAPI_KEY を登録）
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      # Gemini API キー（auto_weekly_strategy.py が週末動向 AI 生成に使用）
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # 強制再生成フラグ（workflow_dispatch input から）
      FORCE_WEEKLY: ${{ github.event.inputs.force_weekly || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests deep_translator feedparser google-generativeai

      - name: Generate market news HTML (6 files)
        run: python generate_market_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html calendar.html charts.html vix.html market-health.html hot-assets.html preview.html sitemap.xml robots.txt
          # 自動生成記事（auto_weekly_strategy / auto_indicator_preview の出力）も含める
          git add guide-weekly-*.html guide-auto-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update market news $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
            # 競合回避: 先に API 経由で push されていた場合に備えて pull --rebase
            git pull --rebase origin main || true
            git push
          fi
