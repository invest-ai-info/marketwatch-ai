name: JP Stock Rankings

# 日本株 値上がり率/値下がり率 トップ20 を「当日の東京クローズ後」に計算して jp-rankings.json を更新。
# Yahoo の価格のみ使用（APIキー不要）。赤字/黒字・銘柄名・業種は静的 jp-stock-info.json から join。
# 更新で jp-rankings.json が commit されると update-market-news の on:push が hot-assets を即再描画。
# ⚠️ 朝(06-07時)実行はcron遅延で10時頃＝場中(東京9:00開場)に更新されうるので不可。
#    クローズ(15:00)後の16:40/17:10に実行＝遅延しても翌オープン(9:00)前に収まり「当日の確定ランキング」を保てる。

on:
  schedule:
    - cron: '40 7 * * *'    # 16:40 JST（東京クローズ15:00の後・出来高ほぼ確定）
    - cron: '10 8 * * *'    # 17:10 JST バックアップ（cron遅延/スキップ対策・翌オープン前に収まる）
  workflow_dispatch:

# 自分自身の二重起動だけ直列化（jp-rankings.json のみ触る＝他workflowとはファイルが別）
concurrency:
  group: jp-rankings
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build JP rankings (Yahoo prices only, no key)
        run: python build_jp_rankings.py
      - name: Commit jp-rankings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jp-rankings.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: jp rankings $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
            git pull --rebase -X ours origin main || true
            git push
          fi
