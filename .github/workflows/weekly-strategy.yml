name: Weekly Strategy (Sunday Evening Re-render)

# 目的: 毎週日曜の夕方、予約エージェント routine `weekly-strategy-brief`（18:30 JST）が
#       weekly-strategy-context.json（検証済みシナリオ）を生成した「後」に、
#       週次戦略記事を強制再生成して検証済みシナリオを反映する。
#
# ・朝の update-market-news 実行で記事自体は先に生成される（context 無しならプレースホルダ）。
# ・この workflow が夕方にそれを検証済みシナリオ版へ上書きする（FORCE_WEEKLY=true）。
# ・context が未生成/未検証なら auto_weekly_strategy 側がプレースホルダのまま描画（誤情報なし）。

on:
  schedule:
    # 日曜 11:13 UTC = 日曜 20:13 JST（routine 18:30 JST の後。cron 混雑回避で :00 を避ける）
    - cron: '13 11 * * 0'
    # バックアップ（routine 遅延・cron スキップ対策、30分後）
    - cron: '43 11 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: '（このworkflowは常に強制再生成。手動起動用）'
        required: false
        default: 'true'

jobs:
  weekly-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      GITHUB_ACTIONS_RUN:    "true"
      FORCE_WEEKLY:          "true"   # 夕方の再描画は常に強制（朝のプレースホルダ版→検証済みシナリオ版へ上書き）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser google-generativeai

      - name: Generate weekly strategy article
        run: python auto_weekly_strategy.py

      - name: Commit & push if new article generated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide-weekly-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new weekly strategy article to commit (today is not Sunday, or article already exists)."
          else
            git commit -m "auto: weekly strategy $(TZ=Asia/Tokyo date +'%Y-%m-%d JST')"
            git pull --rebase origin main || true
            git push
          fi
